{% extends "base.html" %}

{% block content %}
<div style="max-width: 400px; margin: 80px auto; padding: 30px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center;">
    <h2 style="color: #2b63e1; margin-bottom: 20px;">Вход в РАЗУМ 2.0</h2>
    
    <form method="post">
        {% csrf_token %}
        <div style="margin-bottom: 15px; text-align: left;">
            {{ form.as_p }}
        </div>
        <button type="submit" style="width: 100%; background: #2b63e1; color: white; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">
            Войти
        </button>
    </form>
    
    <p style="margin-top: 20px; font-size: 0.9em; color: #666;">
        Нет аккаунта? <a href="{% url 'users:register' %}" style="color: #2b63e1; text-decoration: none;">Зарегистрироваться</a>
    </p>
</div>
{% endblock %}
