{% extends "base.html" %}
{% block content %}
<div class="card shadow-sm">
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead class="table-dark">
                <tr>
                    <th class="text-center">#</th>
                    <th>Участник</th>
                    <th>Направление</th>
                    <th class="text-center">Баллы</th>
                </tr>
            </thead>
            <tbody>
                {% for participant in users_top %}
                <tr {% if participant == request.user %}class="table-info" {% endif %}>
                    <td class="text-center fw-bold">{{ forloop.counter }}</td>
                    <td>{{ participant.username }}</td>
                    <td>{{ participant.direction|default:"—" }}</td>
                    <td class="text-center fw-bold">{{ participant.points|default:0 }}</td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="4" class="text-center p-4 text-muted">Рейтинг пока пуст</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
